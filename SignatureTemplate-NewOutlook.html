<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Email Signature</title>
</head>
<body style="margin:0; padding:0; width:100%;">
<table cellpadding="0" cellspacing="0" border="0" width="600"
       style="border-collapse:collapse; margin:0; padding:0;">
    <tr>
        <!-- Logo -->
        <td width="160" valign="middle" align="center"
            style="padding-left:5px; padding-right:5px; border-right:2px solid #e96c26;">
            <img src="https://onetrac.prophitmgmt.com:8443/pml/resources/spaar_small.png"
                 width="130"
                 alt="SPAAR Logo"
                 border="0"
                 style="display:block; margin:0;">
        </td>

        <!-- Info -->
        <td valign="top" style="padding-left:20px; padding-top:2px;">
            <!-- Name -->
            <font face="Segoe UI" size="3" color="#e96c26">
                <b>%%FirstName%% %%LastName%%</b>
            </font>
            <br>

            <!-- Title -->
            <font face="Segoe UI" size="2" color="#000000">
                <b>%%Title%%</b>
            </font>

            <!-- Info -->
            <div style="margin-top:6px;">
                <font face="Segoe UI" size="2" color="#000000">
                    a: SPAAR Inc. | 12222 44 St SE, Calgary, AB T2Z 4A2<br>
                    e:
                    <a href="mailto:%%Email%%" style="color:#e96c26; text-decoration:underline;">
                        %%Email%%
                    </a>
                    &nbsp;|&nbsp;
                    w:
                    <a href="https://www.spaar.ca" target="_blank" style="color:#e96c26; text-decoration:underline;">
                        www.spaar.ca
                    </a>
                    <br>
                    m: %%Mobile%%
                </font>
            </div>
        </td>
    </tr>

    <!-- Service Lines -->
    <tr>
        <td colspan="2" style="padding-top:13px; padding-bottom:3px;">
            <table cellpadding="0" cellspacing="0" border="0" width="580" style="border-collapse:collapse; margin:0;">
                <tr>
                    <td align="left" style="padding:0;">
                        <font face="Segoe UI" size="2" color="#000000">
                            <b>
                                MULTIFAMILY &amp; COMMERCIAL
                                <span style="color:#e96c26;">|</span>
                                RESIDENTIAL
                                <span style="color:#e96c26;">|</span>
                                PAINT
                                <span style="color:#e96c26;">|</span>
                                EXTERIORS
                                <span style="color:#e96c26;">|</span>
                                SPRAY SYSTEMS
                            </b>
                        </font>
                    </td>
                </tr>
            </table>
        </td>
    </tr>

    <!-- ACSA Banner -->
    <tr>
        <td colspan="2" style="padding-top:5px;">
            <a href="https://youracsa.ca/awards" target="_blank">
                <img src="https://onetrac.prophitmgmt.com:8443/pml/resources/ACSA_2025_Banner_Small.jpg"
                     width="524"
                     height="47"
                     alt="2025 ACSA Banner"
                     border="0"
                     style="display:block; margin:0;">
            </a>
        </td>
    </tr>
</table>
</body>
</html>
